<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub DIY Mentor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #646a73;
      --line: #deded8;
      --accent: #0f766e;
      --accent-2: #b45309;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fbfbf8;
    }

    .bar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 44px;
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 18px;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 9px 12px;
      font-weight: 650;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    button:disabled {
      opacity: .6;
      cursor: wait;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    input {
      width: 72px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    input.search {
      width: 190px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 240px;
      overflow: hidden;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
    }

    .repo {
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--text);
      text-align: left;
      padding: 14px;
      display: block;
    }

    .repo:hover,
    .repo.active {
      background: #eef7f5;
    }

    .repo.active {
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      background: #e1f3ef;
    }

    .repo.loading {
      background: #fff7ed;
    }

    .repo strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
      overflow-wrap: anywhere;
    }

    .repo p {
      margin: 0 0 8px;
      color: var(--muted);
      line-height: 1.4;
      font-size: 13px;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .detail {
      padding: 18px;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    h2 {
      font-size: 20px;
      margin: 0 0 8px;
      overflow-wrap: anywhere;
    }

    h3 {
      margin: 22px 0 8px;
      font-size: 15px;
    }

    a { color: var(--accent); }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 5px 0; line-height: 1.45; }

    .idea {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #f4efe6;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .filters {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 20px 14px;
      display: grid;
      gap: 8px;
      border-top: 1px solid var(--line);
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      min-width: 54px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .chip,
    .lang-toggle {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 650;
    }

    .chip.active,
    .lang-toggle.active {
      border-color: var(--accent);
      background: #e1f3ef;
      color: var(--accent);
    }

    @media (max-width: 820px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .toolbar {
        align-items: flex-start;
      }
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>GitHub 趣事发现器 & AI DIY 导师</h1>
      <div class="toolbar">
        <div class="controls">
          <label><span data-i18n="search">搜索</span> <input id="query" class="search" type="search" placeholder=""></label>
          <label><span data-i18n="days">天数</span> <input id="days" type="number" min="1" max="30" value="7"></label>
          <label><span data-i18n="limit">数量</span> <input id="limit" type="number" min="1" max="50" value="12"></label>
          <button id="discover" data-i18n="discover">发现项目</button>
          <button class="lang-toggle active" data-lang="zh">中文</button>
          <button class="lang-toggle" data-lang="en">English</button>
        </div>
      </div>
    </div>
    <div class="filters">
      <div class="filter-row" data-filter="language_filter">
        <span class="filter-label" data-i18n="language">语言</span>
        <button class="chip active" data-value="all">全部</button>
        <button class="chip" data-value="zh">中文</button>
        <button class="chip" data-value="en">英文</button>
        <button class="chip" data-value="other">其他</button>
      </div>
      <div class="filter-row" data-filter="topic_filter">
        <span class="filter-label" data-i18n="topic">主题</span>
        <button class="chip active" data-value="all">全部</button>
        <button class="chip" data-value="ai">AI 灵感</button>
        <button class="chip" data-value="finance">量化金融</button>
        <button class="chip" data-value="home">智能家居</button>
        <button class="chip" data-value="media">创意媒体</button>
        <button class="chip" data-value="game">极客游戏</button>
        <button class="chip" data-value="productivity">效率黑客</button>
        <button class="chip" data-value="humanities">人文探索</button>
      </div>
      <div class="filter-row" data-filter="sort_mode">
        <span class="filter-label" data-i18n="sort">排序</span>
        <button class="chip active" data-value="trending">黑马榜</button>
        <button class="chip" data-value="stars">经典榜</button>
        <button class="chip" data-value="beginner">新手友好</button>
        <button class="chip" data-value="hardware">硬件项目</button>
        <button class="chip" data-value="software">纯软工具</button>
      </div>
    </div>
  </header>
  <main>
    <section class="panel">
      <div id="repoList" class="repo-list">
        <div class="empty">点击“发现项目”开始。需要先在 `.env` 配置 `GITHUB_TOKEN`。</div>
      </div>
    </section>
    <section class="panel">
      <div id="detail" class="detail">
        <div class="empty">选择一个项目后，这里会显示白话解读和 AI DIY 改造建议。</div>
      </div>
    </section>
  </main>
  <script>
    const repoList = document.querySelector("#repoList");
    const detail = document.querySelector("#detail");
    const discoverButton = document.querySelector("#discover");
    const state = {
      language: "zh",
      language_filter: "all",
      topic_filter: "all",
      sort_mode: "trending",
      repos: [],
      selectedName: "",
      loadingName: "",
      analysisCache: new Map()
    };
    let selectedName = "";

    const labels = {
      zh: {
        title: "GitHub 趣事发现器 & AI DIY 导师",
        search: "搜索",
        days: "天数",
        limit: "数量",
        discover: "发现项目",
        language: "语言",
        topic: "主题",
        sort: "排序",
        start: "点击“发现项目”开始。需要先在 `.env` 配置 `GITHUB_TOKEN`。",
        waiting: "等待选择项目。",
        discovering: "正在从 GitHub 捞有意思的项目...",
        noResults: "没有找到合适项目。可以扩大天数或稍后再试。",
        failed: "发现失败：",
        analyzing: "正在生成解读和 DIY 建议...",
        analyzeFailed: "分析失败：",
        openGithub: "打开 GitHub",
        summary: "一句话白话简介",
        difficulty: "上手难度",
        macos: "macOS 门槛",
        windows: "Windows 门槛",
        angle: "AI 改造总方向",
        pitfalls: "避坑指南",
        capability: "AI 能力：",
        useful: "为什么有用：",
        forWhom: "适合：",
        cached: "已从缓存加载"
      },
      en: {
        title: "GitHub Fun Finder & AI DIY Mentor",
        search: "Search",
        days: "Days",
        limit: "Limit",
        discover: "Discover",
        language: "Language",
        topic: "Topic",
        sort: "Sort",
        start: "Click Discover to start. Configure GITHUB_TOKEN in `.env` first.",
        waiting: "Select a project to see analysis and AI DIY suggestions.",
        discovering: "Finding interesting GitHub projects...",
        noResults: "No matching projects found. Try more days or a broader filter.",
        failed: "Discovery failed: ",
        analyzing: "Generating analysis and DIY suggestions...",
        analyzeFailed: "Analysis failed: ",
        openGithub: "Open GitHub",
        summary: "Plain-language Summary",
        difficulty: "Setup Difficulty",
        macos: "macOS Requirements",
        windows: "Windows Requirements",
        angle: "AI Upgrade Direction",
        pitfalls: "Pitfalls",
        capability: "AI capability: ",
        useful: "Why useful: ",
        forWhom: "For: ",
        cached: "Loaded from cache"
      }
    };

    const chipLabels = {
      zh: {
        language_filter: {all: "全部", zh: "中文", en: "英文", other: "其他"},
        topic_filter: {all: "全部", ai: "AI 灵感", finance: "量化金融", home: "智能家居", media: "创意媒体", game: "极客游戏", productivity: "效率黑客", humanities: "人文探索"},
        sort_mode: {trending: "黑马榜", stars: "经典榜", beginner: "新手友好", hardware: "硬件项目", software: "纯软工具"}
      },
      en: {
        language_filter: {all: "All", zh: "Chinese", en: "English", other: "Other"},
        topic_filter: {all: "All", ai: "AI Ideas", finance: "Quant Finance", home: "Smart Home", media: "Creative Media", game: "Geek Games", productivity: "Productivity", humanities: "Humanities"},
        sort_mode: {trending: "Trending", stars: "Most Stars", beginner: "Beginner Friendly", hardware: "Hardware", software: "Software Only"}
      }
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function t(key) {
      return labels[state.language][key] || labels.zh[key] || key;
    }

    function repoDescription(repo) {
      if (state.language === "zh") return repo.description_zh || repo.description || "暂无简介";
      return repo.description_en || repo.description || "No description";
    }

    function renderRepos(repos = state.repos) {
      if (!repos.length) {
        repoList.innerHTML = `<div class="empty">${escapeHtml(t("noResults"))}</div>`;
        return;
      }
      repoList.innerHTML = repos.map((repo, index) => `
        <button class="repo ${repo.name === state.selectedName ? "active" : ""} ${repo.name === state.loadingName ? "loading" : ""}" data-index="${index}">
          <strong>${escapeHtml(repo.name)}</strong>
          <p>${escapeHtml(repoDescription(repo))}</p>
          <span class="meta">
            <span>★ ${repo.stars_total}</span>
            <span>${state.language === "zh" ? "7日" : "7d"} +${repo.stars_last_7d_estimate}</span>
            <span>${escapeHtml(repo.language || "Unknown")}</span>
          </span>
        </button>
      `).join("");
      repoList.querySelectorAll(".repo").forEach(button => {
        button.addEventListener("click", () => analyzeRepo(repos[Number(button.dataset.index)]));
      });
    }

    async function discover() {
      discoverButton.disabled = true;
      state.selectedName = "";
      state.loadingName = "";
      state.repos = [];
      repoList.innerHTML = `<div class="empty">${escapeHtml(t("discovering"))}</div>`;
      detail.innerHTML = `<div class="empty">${escapeHtml(t("waiting"))}</div>`;
      try {
        const days = document.querySelector("#days").value;
        const limit = document.querySelector("#limit").value;
        const rawQuery = document.querySelector("#query").value.trim();
        const query = encodeURIComponent(rawQuery);
        const params = new URLSearchParams({
          days,
          limit,
          ui_language: state.language,
          language_filter: state.language_filter,
          topic_filter: state.topic_filter,
          sort_mode: state.sort_mode
        });
        if (rawQuery) params.set("q", rawQuery);
        const url = `/api/discover?${params.toString()}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(await readError(response));
        state.repos = await response.json();
        renderRepos();
      } catch (error) {
        repoList.innerHTML = `<div class="empty">${escapeHtml(t("failed") + error.message)}</div>`;
      } finally {
        discoverButton.disabled = false;
      }
    }

    async function analyzeRepo(repo) {
      state.selectedName = repo.name;
      state.loadingName = repo.name;
      renderRepos();
      const cacheKey = `${repo.name}|${repo.pushed_at || ""}|${state.language}`;
      if (state.analysisCache.has(cacheKey)) {
        state.loadingName = "";
        renderDetail(state.analysisCache.get(cacheKey));
        renderRepos();
        return;
      }
      detail.innerHTML = `<h2>${escapeHtml(repo.name)}</h2><p class="status">${escapeHtml(t("analyzing"))}</p>`;
      try {
        const response = await fetch("/api/full-analysis", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({repo, ui_language: state.language})
        });
        if (!response.ok) throw new Error(await readError(response));
        const result = await response.json();
        state.analysisCache.set(cacheKey, result);
        renderDetail(result);
      } catch (error) {
        detail.innerHTML = `<div class="empty">${escapeHtml(t("analyzeFailed") + error.message)}</div>`;
      } finally {
        state.loadingName = "";
        renderRepos();
      }
    }

    function renderDetail(result) {
      const {repo, analysis, mentor} = result;
      detail.innerHTML = `
        <h2>${escapeHtml(repo.name)}</h2>
        <p><a href="${escapeHtml(repo.url)}" target="_blank" rel="noreferrer">${escapeHtml(t("openGithub"))}</a>${result.cached ? ` · <span class="badge">${escapeHtml(t("cached"))}</span>` : ""}</p>
        <h3>${escapeHtml(t("summary"))}</h3>
        <p>${escapeHtml(analysis.plain_summary)}</p>
        <h3>${escapeHtml(t("difficulty"))}</h3>
        <p><span class="badge">${analysis.difficulty_score}/10</span></p>
        <h3>${escapeHtml(t("macos"))}</h3>
        <ul>${analysis.macos_requirements.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        <h3>${escapeHtml(t("windows"))}</h3>
        <ul>${analysis.windows_requirements.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        <h3>${escapeHtml(t("angle"))}</h3>
        <p>${escapeHtml(mentor.overall_angle)}</p>
        ${mentor.ideas.map(idea => `
          <div class="idea">
            <span class="badge">${escapeHtml(idea.type)} · ${escapeHtml(idea.difficulty)}</span>
            <h3>${escapeHtml(idea.title)}</h3>
            <p>${escapeHtml(idea.direction)}</p>
            <p><strong>${escapeHtml(t("forWhom"))}</strong>${escapeHtml(idea.for_whom)}</p>
            <ul>${idea.minimum_steps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}</ul>
            <p><strong>${escapeHtml(t("capability"))}</strong>${escapeHtml(idea.ai_capability)}</p>
            <p><strong>${escapeHtml(t("useful"))}</strong>${escapeHtml(idea.why_this_is_useful)}</p>
          </div>
        `).join("")}
        <h3>${escapeHtml(t("pitfalls"))}</h3>
        <ul>${mentor.pitfalls.map(pitfall => `<li><strong>${escapeHtml(pitfall.platform)}：</strong>${escapeHtml(pitfall.symptom)}；${escapeHtml(pitfall.fix)}</li>`).join("")}</ul>
      `;
    }

    async function readError(response) {
      const text = await response.text();
      if (!text) return response.statusText;
      try {
        const data = JSON.parse(text);
        return data.detail || response.statusText;
      } catch {
        return text;
      }
    }

    discoverButton.addEventListener("click", discover);
    document.querySelector("#query").addEventListener("keydown", event => {
      if (event.key === "Enter") discover();
    });
    document.querySelectorAll(".filter-row").forEach(row => {
      const key = row.dataset.filter;
      row.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          state[key] = chip.dataset.value;
          row.querySelectorAll(".chip").forEach(item => item.classList.remove("active"));
          chip.classList.add("active");
          discover();
        });
      });
    });
    document.querySelectorAll(".lang-toggle").forEach(button => {
      button.addEventListener("click", event => {
        event.preventDefault();
        state.language = button.dataset.lang;
        document.querySelectorAll(".lang-toggle").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        applyLanguage();
        if (state.repos.length) renderRepos();
        if (!state.selectedName) detail.innerHTML = `<div class="empty">${escapeHtml(t("waiting"))}</div>`;
      });
    });

    function applyLanguage() {
      document.querySelector("h1").textContent = t("title");
      document.querySelectorAll("[data-i18n]").forEach(node => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll(".filter-row").forEach(row => {
        const group = row.dataset.filter;
        row.querySelectorAll(".chip").forEach(chip => {
          chip.textContent = chipLabels[state.language][group][chip.dataset.value];
        });
      });
      if (!state.repos.length) {
        repoList.innerHTML = `<div class="empty">${escapeHtml(t("start"))}</div>`;
      }
    }

    applyLanguage();
  </script>
</body>
</html>
