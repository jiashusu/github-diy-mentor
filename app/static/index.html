<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub DIY Mentor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #646a73;
      --line: #deded8;
      --accent: #0f766e;
      --accent-2: #b45309;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fbfbf8;
    }

    .bar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 44px;
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 18px;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 9px 12px;
      font-weight: 650;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    button:disabled {
      opacity: .6;
      cursor: wait;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      width: 72px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    input.search {
      width: 190px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 240px;
      overflow: hidden;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
    }

    .repo {
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--text);
      text-align: left;
      padding: 14px;
      display: block;
    }

    .repo:hover,
    .repo.active {
      background: #eef7f5;
    }

    .repo strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
      overflow-wrap: anywhere;
    }

    .repo p {
      margin: 0 0 8px;
      color: var(--muted);
      line-height: 1.4;
      font-size: 13px;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .detail {
      padding: 18px;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    h2 {
      font-size: 20px;
      margin: 0 0 8px;
      overflow-wrap: anywhere;
    }

    h3 {
      margin: 22px 0 8px;
      font-size: 15px;
    }

    a { color: var(--accent); }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 5px 0; line-height: 1.45; }

    .idea {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #f4efe6;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    @media (max-width: 820px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>GitHub 趣事发现器 & AI DIY 导师</h1>
      <div class="controls">
        <label>搜索 <input id="query" class="search" type="search" placeholder=""></label>
        <label>天数 <input id="days" type="number" min="1" max="30" value="7"></label>
        <label>数量 <input id="limit" type="number" min="1" max="50" value="12"></label>
        <button id="discover">发现项目</button>
      </div>
    </div>
  </header>
  <main>
    <section class="panel">
      <div id="repoList" class="repo-list">
        <div class="empty">点击“发现项目”开始。需要先在 `.env` 配置 `GITHUB_TOKEN`。</div>
      </div>
    </section>
    <section class="panel">
      <div id="detail" class="detail">
        <div class="empty">选择一个项目后，这里会显示白话解读和 AI DIY 改造建议。</div>
      </div>
    </section>
  </main>
  <script>
    const repoList = document.querySelector("#repoList");
    const detail = document.querySelector("#detail");
    const discoverButton = document.querySelector("#discover");
    let selectedName = "";

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function renderRepos(repos) {
      if (!repos.length) {
        repoList.innerHTML = '<div class="empty">没有找到合适项目。可以扩大天数或稍后再试。</div>';
        return;
      }
      repoList.innerHTML = repos.map((repo, index) => `
        <button class="repo ${repo.name === selectedName ? "active" : ""}" data-index="${index}">
          <strong>${escapeHtml(repo.name)}</strong>
          <p>${escapeHtml(repo.description || "暂无简介")}</p>
          <span class="meta">
            <span>★ ${repo.stars_total}</span>
            <span>7日 +${repo.stars_last_7d_estimate}</span>
            <span>${escapeHtml(repo.language || "Unknown")}</span>
          </span>
        </button>
      `).join("");
      repoList.querySelectorAll(".repo").forEach(button => {
        button.addEventListener("click", () => analyzeRepo(repos[Number(button.dataset.index)]));
      });
    }

    async function discover() {
      discoverButton.disabled = true;
      selectedName = "";
      repoList.innerHTML = '<div class="empty">正在从 GitHub 捞有意思的项目...</div>';
      detail.innerHTML = '<div class="empty">等待选择项目。</div>';
      try {
        const days = document.querySelector("#days").value;
        const limit = document.querySelector("#limit").value;
        const rawQuery = document.querySelector("#query").value.trim();
        const query = encodeURIComponent(rawQuery);
        const url = rawQuery
          ? `/api/discover?days=${days}&limit=${limit}&q=${query}`
          : `/api/discover?days=${days}&limit=${limit}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(await readError(response));
        renderRepos(await response.json());
      } catch (error) {
        repoList.innerHTML = `<div class="empty">发现失败：${escapeHtml(error.message)}</div>`;
      } finally {
        discoverButton.disabled = false;
      }
    }

    async function analyzeRepo(repo) {
      selectedName = repo.name;
      detail.innerHTML = `<h2>${escapeHtml(repo.name)}</h2><p class="status">正在生成解读和 DIY 建议...</p>`;
      try {
        const response = await fetch("/api/full-analysis", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({repo})
        });
        if (!response.ok) throw new Error(await readError(response));
        renderDetail(await response.json());
      } catch (error) {
        detail.innerHTML = `<div class="empty">分析失败：${escapeHtml(error.message)}</div>`;
      }
    }

    function renderDetail(result) {
      const {repo, analysis, mentor} = result;
      detail.innerHTML = `
        <h2>${escapeHtml(repo.name)}</h2>
        <p><a href="${escapeHtml(repo.url)}" target="_blank" rel="noreferrer">打开 GitHub</a></p>
        <h3>一句话白话简介</h3>
        <p>${escapeHtml(analysis.plain_summary)}</p>
        <h3>上手难度</h3>
        <p><span class="badge">${analysis.difficulty_score}/10</span></p>
        <h3>macOS 门槛</h3>
        <ul>${analysis.macos_requirements.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        <h3>Windows 门槛</h3>
        <ul>${analysis.windows_requirements.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        <h3>AI 改造总方向</h3>
        <p>${escapeHtml(mentor.overall_angle)}</p>
        ${mentor.ideas.map(idea => `
          <div class="idea">
            <span class="badge">${escapeHtml(idea.type)} · ${escapeHtml(idea.difficulty)}</span>
            <h3>${escapeHtml(idea.title)}</h3>
            <p>${escapeHtml(idea.direction)}</p>
            <p><strong>适合：</strong>${escapeHtml(idea.for_whom)}</p>
            <ul>${idea.minimum_steps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}</ul>
            <p><strong>AI 能力：</strong>${escapeHtml(idea.ai_capability)}</p>
            <p><strong>为什么有用：</strong>${escapeHtml(idea.why_this_is_useful)}</p>
          </div>
        `).join("")}
        <h3>避坑指南</h3>
        <ul>${mentor.pitfalls.map(pitfall => `<li><strong>${escapeHtml(pitfall.platform)}：</strong>${escapeHtml(pitfall.symptom)}；${escapeHtml(pitfall.fix)}</li>`).join("")}</ul>
      `;
    }

    async function readError(response) {
      const text = await response.text();
      if (!text) return response.statusText;
      try {
        const data = JSON.parse(text);
        return data.detail || response.statusText;
      } catch {
        return text;
      }
    }

    discoverButton.addEventListener("click", discover);
    document.querySelector("#query").addEventListener("keydown", event => {
      if (event.key === "Enter") discover();
    });
  </script>
</body>
</html>
