<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub DIY Mentor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #646a73;
      --line: #deded8;
      --accent: #0f766e;
      --accent-2: #b45309;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fbfbf8;
    }

    .bar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 44px;
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 18px;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 9px 12px;
      font-weight: 650;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    button:disabled {
      opacity: .6;
      cursor: wait;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    input {
      width: 72px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    input.search {
      width: 190px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 240px;
      overflow: hidden;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
    }

    .repo {
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--text);
      text-align: left;
      padding: 14px;
      display: block;
    }

    .repo:hover,
    .repo.active {
      background: #eef7f5;
    }

    .repo.active {
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      background: #e1f3ef;
    }

    .repo.loading {
      background: #fff7ed;
    }

    .repo strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
      overflow-wrap: anywhere;
    }

    .repo p {
      margin: 0 0 8px;
      color: var(--muted);
      line-height: 1.4;
      font-size: 13px;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .detail {
      padding: 18px;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    h2 {
      font-size: 20px;
      margin: 0 0 8px;
      overflow-wrap: anywhere;
    }

    h3 {
      margin: 22px 0 8px;
      font-size: 15px;
    }

    a { color: var(--accent); }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 5px 0; line-height: 1.45; }

    .idea {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #f4efe6;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--muted);
      background: #fbfbf8;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 18px;
    }

    .copy-fallback {
      margin: 12px 0 18px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfbf8;
    }

    .copy-fallback textarea {
      width: 100%;
      min-height: 150px;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      resize: vertical;
      font: inherit;
      line-height: 1.5;
      background: #fff;
    }

    .empty-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .page-nav {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fbfbf8;
    }

    .page-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .page-chip,
    .page-add {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 13px;
      font-weight: 650;
    }

    .page-chip.active {
      border-color: var(--accent);
      background: #e1f3ef;
      color: var(--accent);
    }

    .page-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .toast-region {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      z-index: 40;
      pointer-events: none;
    }

    .toast {
      min-width: 180px;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(32, 33, 36, 0.12);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-success {
      border-color: #86efac;
    }

    .toast-info {
      border-color: #93c5fd;
    }

    .toast-error {
      border-color: #fca5a5;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .filters {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 20px 14px;
      display: grid;
      gap: 8px;
      border-top: 1px solid var(--line);
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      min-width: 54px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .chip,
    .lang-toggle {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 650;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 48px;
      max-width: 100%;
      white-space: nowrap;
    }

    .chip-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent);
      font-size: 11px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .chip.active,
    .lang-toggle.active {
      border-color: var(--accent);
      background: #e1f3ef;
      color: var(--accent);
    }

    @media (max-width: 820px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .toolbar {
        align-items: flex-start;
      }
      main {
        grid-template-columns: 1fr;
      }
      .chip {
        min-width: 0;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>GitHub 趣事发现器 & AI DIY 导师</h1>
      <div class="toolbar">
        <div class="controls">
          <label><span data-i18n="search">搜索</span> <input id="query" class="search" type="search" placeholder=""></label>
          <label><span data-i18n="days">天数</span> <input id="days" type="number" min="1" max="30" value="7"></label>
          <label><span data-i18n="limit">数量</span> <input id="limit" type="number" min="1" max="50" value="12"></label>
          <button id="discover" data-i18n="discover">发现项目</button>
          <button id="favoritesToggle" class="secondary" data-i18n="favoritesOnly">只看收藏</button>
          <button id="exportMarkdown" class="secondary" data-i18n="export">导出</button>
          <button class="lang-toggle active" data-lang="zh">中文</button>
          <button class="lang-toggle" data-lang="en">English</button>
        </div>
      </div>
    </div>
    <div class="filters">
      <div class="filter-row" data-filter="language_filter">
        <span class="filter-label" data-i18n="language">语言</span>
        <button class="chip active" data-value="all">全部</button>
        <button class="chip" data-value="zh">中文</button>
        <button class="chip" data-value="en">英文</button>
        <button class="chip" data-value="other">其他</button>
      </div>
      <div class="filter-row" data-filter="topic_filter">
        <span class="filter-label" data-i18n="topic">主题</span>
        <button class="chip active" data-value="all">全部</button>
        <button class="chip" data-value="ai">AI 灵感</button>
        <button class="chip" data-value="finance">量化金融</button>
        <button class="chip" data-value="home">智能家居</button>
        <button class="chip" data-value="media">创意媒体</button>
        <button class="chip" data-value="game">极客游戏</button>
        <button class="chip" data-value="productivity">效率黑客</button>
        <button class="chip" data-value="humanities">人文探索</button>
      </div>
      <div class="filter-row" data-filter="sort_mode">
        <span class="filter-label" data-i18n="sort">排序</span>
        <button class="chip active" data-value="trending">黑马榜</button>
        <button class="chip" data-value="stars">经典榜</button>
        <button class="chip" data-value="beginner">新手友好</button>
        <button class="chip" data-value="hardware">硬件项目</button>
        <button class="chip" data-value="software">纯软工具</button>
      </div>
    </div>
  </header>
  <main>
    <section class="panel">
      <div id="repoList" class="repo-list">
        <div class="empty">点击“发现项目”开始。需要先在 `.env` 配置 `GITHUB_TOKEN`。</div>
      </div>
      <div id="pageNav" class="page-nav"></div>
    </section>
    <section class="panel">
      <div id="detail" class="detail">
        <div class="empty">选择一个项目后，这里会显示白话解读和 AI DIY 改造建议。</div>
      </div>
    </section>
  </main>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
